services:
  postgres:
    image: postgres:16-alpine
    container_name: marketer-pro-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: marketer
    ports:
      - "5432:5432"
    volumes:
      - marketer-pro-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketer"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  marketer-pro-pg-data:
