name: Mobile Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile-client/**'
      - 'packages/**'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile-client/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options: [ios, android, both]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ── Web build (shared by both platforms) ─────────────────────────────────────
  web-build:
    name: Build web assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @marketer-pro/mobile-client type-check

      - name: Build
        run: pnpm --filter @marketer-pro/mobile-client build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/mobile-client/dist
          retention-days: 1

  # ── Android ───────────────────────────────────────────────────────────────────
  android-build:
    name: Android build
    needs: web-build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform != 'ios' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/mobile-client/dist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Capacitor sync
        run: npx cap sync android
        working-directory: apps/mobile-client

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile-client/android/app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        working-directory: apps/mobile-client/android
        env:
          KEYSTORE_PATH:     release.keystore
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: apps/mobile-client/android/app/build/outputs/apk/release/app-release.apk

  # ── iOS ───────────────────────────────────────────────────────────────────────
  ios-build:
    name: iOS build
    needs: web-build
    runs-on: macos-14
    if: ${{ github.event.inputs.platform != 'android' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/mobile-client/dist

      - name: Capacitor sync
        run: npx cap sync ios
        working-directory: apps/mobile-client

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/mobile-client/ios/App

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -k ~/Library/Keychains/login.keychain-db

      - name: Import provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace apps/mobile-client/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath apps/mobile-client/ios/App/App.xcarchive \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath apps/mobile-client/ios/App/App.xcarchive \
            -exportPath apps/mobile-client/ios/App/export \
            -exportOptionsPlist apps/mobile-client/ios/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: apps/mobile-client/ios/App/export/App.ipa
